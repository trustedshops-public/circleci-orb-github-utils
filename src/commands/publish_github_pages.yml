description: >
  Publish github pages to gh-branches page using Node.js
parameters:
  folder:
    type: string
    description: Folder to deploy
    default: docs/
  git_commit_author_name:
    type: string
    description: Author to set via git config for the commit
  git_commit_author_email:
    type: string
    description: E-Mail to set via git config for the commit
  git_commit_messages:
    type: string
    description: Commit message to use for git
    default: "docs: Update github pages [ci skip]"
  dotfiles:
    type: boolean
    description: Include dotfiles when publishing
    default: false
  nojekyll:
    type: boolean
    description: Add a .nojekyll file to disable Jekyll processing
    default: false
  cname:
    type: string
    description: Optional custom domain to write into CNAME
    default: ""
  repository_url:
    type: string
    description: Repository url with env vars
    default: "https://token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
steps:
  - run:
      name: Publish GitHub pages
      command: |
        export EMAIL="<<parameters.git_commit_author_email>>"
        set --
        if [ "<<parameters.dotfiles>>" = "true" ]; then
          set -- "$@" "--dotfiles"
        fi
        if [ "<<parameters.nojekyll>>" = "true" ]; then
          set -- "$@" "--nojekyll"
        fi
        if [ -n "<<parameters.cname>>" ]; then
          set -- "$@" "--cname" "<<parameters.cname>>"
        fi
        npx gh-pages@6.3.0 \
          -d "<<parameters.folder>>" \
          -u "<<parameters.git_commit_author_name>> <${EMAIL}>" \
          --message "<<parameters.git_commit_messages>>" \
          --repo "<<parameters.repository_url>>" \
          "$@"
